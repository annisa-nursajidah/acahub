<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AcaHub Register</title>

    <link rel="stylesheet" href="./styles.css">

</head>

<body>

    <section class="acahub-auth-page">

        <div class="mouse-light" id="mouseLight"></div>

        <div class="acahub-auth-box">

            <h2>Buat Akun</h2>
            <p>Daftar dan mulai pengalaman modern bersama AcaHub</p>

            <form>

                <div class="acahub-input">
                    <input type="text" required placeholder="Nama Lengkap">
                </div>

                <div class="acahub-input">
                    <input type="email" required placeholder="Email">
                </div>

                <div class="acahub-input">
                    <input type="password" required placeholder="Password">
                </div>

                <button type="button" class="acahub-btn" id="registerBtn">
                    Daftar Sekarang
                </button>

            </form>

            <div class="acahub-login-link">
                Sudah punya akun?
                <a href="./login.html">Masuk di sini</a>
            </div>

        </div>
    </section>

    <script src="./script.js"></script>

</body>

</html>
