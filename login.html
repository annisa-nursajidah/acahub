<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AcaHub Login</title>

<link rel="stylesheet" href="./styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<section class="acahub-auth-page">

<div class="mouse-light" id="mouseLight"></div>

<div class="acahub-auth-box">

<h2>Selamat Datang</h2>
<p>Masuk untuk melanjutkan ke AcaHub</p>

<form id="loginForm">

<div class="acahub-input">
<input type="email" id="email" required placeholder="Email">
</div>

<div class="acahub-input">
<input type="password" id="password" required placeholder="Password">
</div>

<button type="submit" class="acahub-btn">
Masuk Sekarang
</button>

</form>

<div class="acahub-login-link">
Belum punya akun?
<a href="./page.html">Daftar di sini</a>
</div>

</div>

</section>

<script src="./login.js"></script>

</body>
</html>
